{% comment %}
Usage: {% include social-share.html title=page.title url=page.url type="post" %}
{% endcomment %}
<div class="share-row">
    <span class="share-row__label">Share this {{ include.type | default: "page" }}</span>
    <div class="share-row__links">
        <a href="https://twitter.com/intent/tweet?text={{ include.title | uri_escape }}&url={{ include.url | absolute_url }}" target="_blank" rel="noopener noreferrer" aria-label="Share on X">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2H21l-6.52 7.45L22 22h-6.77l-5.3-6.93L3.75 22H1l7-8L1.55 2h6.93l4.8 6.34L18.24 2zm-2.37 18h1.86L7.21 4h-2L15.87 20z"/></svg>
        </a>
        <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ include.url | absolute_url }}" target="_blank" rel="noopener noreferrer" aria-label="Share on LinkedIn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM3 9h4v12H3V9zm7 0h3.8v1.7h.06c.53-1 1.83-2.06 3.77-2.06 4.03 0 4.77 2.65 4.77 6.1V21h-4v-5.4c0-1.3-.03-2.98-1.82-2.98-1.82 0-2.1 1.42-2.1 2.88V21h-4V9z"/></svg>
        </a>
        <a href="mailto:?subject={{ include.title | uri_escape }}&body={{ include.url | absolute_url }}" aria-label="Share via email">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,7 12,13 21,7"/></svg>
        </a>
    </div>
</div>
