name: Build & deploy to VPS

on:
  push:
    branches: [main]
  schedule:
    # Every 15 min: rebuild so future-dated posts go live near their scheduled time.
    # Jekyll `future: false` hides posts until their `date:` has passed; each rebuild
    # surfaces any that have since become due (approximate, within ~15 min).
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: deploy-newsroom
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      - name: Deploy to VPS via rsync
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          SSH="ssh -i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          rc=1
          for attempt in 1 2 3; do
            rsync -az --delete --chmod=D755,F644 -e "$SSH" \
              _site/ deploy@72.60.71.39:/var/www/rangeway-newsroom/ && { rc=0; break; }
            echo "::warning::deploy attempt $attempt failed"
            [ "$attempt" -lt 3 ] && sleep $((attempt*10)) || true
          done
          exit $rc
