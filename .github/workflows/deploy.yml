name: Build & publish for VPS pull-deploy

on:
  push:
    branches: [main]
  schedule:
    # Every 15 min: rebuild so future-dated posts go live near their scheduled time.
    # Jekyll `future: false` hides posts until their `date:` has passed; each rebuild
    # surfaces any that have since become due (approximate, within ~15 min).
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: deploy-newsroom
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      # The VPS polls the deploy-dist branch every 2 minutes and rsyncs it
      # into /var/www/rangeway-newsroom (rangeway-deploy.timer on the server).
      # CI never connects to the VPS: Hostinger's network edge intermittently
      # drops inbound connections from GitHub's shared runner IP ranges, so
      # push-based SSH deploys were randomly failing.
      - name: Publish _site to deploy-dist branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd _site
          git init -q -b deploy-dist
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "deploy ${GITHUB_SHA}"
          git push -q --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" deploy-dist
